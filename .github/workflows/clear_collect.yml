name: Collect V2Ray Configs

on:
  schedule:
    # Запуск каждые 6 часов
    - cron: "0 */6 * * *"
  workflow_dispatch:   # Запуск вручную из вкладки Actions

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Разрешение на пуш изменений в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run collector
        # Передаем скрытые ссылки из GitHub Secrets в скрипт
        env:
          CONFIG_URLS: ${{ secrets.CONFIG_URLS }}
        run: python mir2.py

      - name: Commit & push if configs changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем все текстовые файлы в папке configs
          git add configs/*.txt
          
          # Коммитим только в случае реальных изменений
          git diff --cached --quiet || \
            git commit -m "chore: update split configs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
